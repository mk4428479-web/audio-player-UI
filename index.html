<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Player</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1db954; /* Spotify Green-ish but neon */
            --dark: #121212;
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
            --text-dim: #b3b3b3;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }

        body {
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            overflow: hidden;
            background-color: var(--dark);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* DYNAMIC BACKGROUND (Changes with song) */
        .bg-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            filter: blur(60px) brightness(0.4);
            z-index: -1;
            transition: background-image 1s ease-in-out;
        }

        /* --- MAIN PLAYER CARD --- */
        .player-container {
            width: 380px;
            background: rgba(20, 20, 20, 0.4);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 10;
        }

        /* Top Bar */
        .top-bar {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 0.9rem;
            color: var(--text-dim);
        }
        .top-bar i { cursor: pointer; transition: 0.3s; }
        .top-bar i:hover { color: var(--text); transform: scale(1.1); }

        /* Album Art */
        .img-box {
            width: 240px;
            height: 240px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            margin-bottom: 25px;
            position: relative;
        }
        .img-box img {
            width: 100%; height: 100%; object-fit: cover;
        }

        /* Song Info */
        .song-info {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .name {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
        }
        .artist {
            font-size: 0.9rem;
            color: var(--text-dim);
        }
        .like-btn i {
            font-size: 1.2rem;
            color: var(--text-dim);
            cursor: pointer;
            transition: 0.2s;
        }
        .like-btn i.active { color: var(--primary); animation: heartPop 0.3s; }

        @keyframes heartPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.4); }
            100% { transform: scale(1); }
        }

        /* VISUALIZER (Simulated) */
        .visualizer {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 4px;
            height: 40px;
            margin-bottom: 20px;
            opacity: 0.6;
        }
        .bar {
            width: 4px;
            background: var(--primary);
            border-radius: 2px;
            animation: bounce 1s infinite ease-in-out;
        }
        .bar:nth-child(odd) { animation-duration: 0.8s; }
        .bar:nth-child(2n) { animation-duration: 1.1s; }
        .bar:nth-child(3n) { animation-duration: 1.3s; }
        .paused-anim .bar { animation-play-state: paused; height: 5px !important; transition: height 0.3s; }

        @keyframes bounce {
            0%, 100% { height: 5px; }
            50% { height: 35px; }
        }

        /* Progress Area */
        .progress-area {
            width: 100%;
            height: 5px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 10px;
            position: relative;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: var(--primary);
            border-radius: 10px;
            position: relative;
            transition: width 0.1s linear;
        }
        .progress-bar::after {
            content: '';
            position: absolute;
            right: -6px; top: -4px;
            width: 12px; height: 12px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            opacity: 0;
            transition: opacity 0.2s;
        }
        .progress-area:hover .progress-bar::after { opacity: 1; }

        .timer {
            width: 100%;
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-bottom: 25px;
        }

        /* Controls */
        .controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }
        .btn {
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn:hover { color: #fff; }
        .play-btn {
            width: 60px; height: 60px;
            background: #fff;
            color: #000;
            border-radius: 50%;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(255,255,255,0.3);
        }
        .play-btn:hover { transform: scale(1.05); }

        /* VOLUME SLIDER */
        .volume-container {
            margin-top: 25px;
            width: 80%;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 12px; width: 12px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            margin-top: -4px;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
        }

        /* --- SLIDE-IN PLAYLIST --- */
        .playlist {
            position: fixed;
            top: 0; right: -400px;
            width: 350px; height: 100%;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(20px);
            z-index: 20;
            padding: 30px;
            transition: right 0.4s cubic-bezier(0.77, 0, 0.175, 1);
            border-left: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
        }
        .playlist.open { right: 0; }
        .playlist-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 30px; border-bottom: 1px solid #333; padding-bottom: 15px;
        }
        .playlist-items {
            overflow-y: auto;
            flex: 1;
        }
        .playlist-item {
            display: flex; align-items: center;
            padding: 10px; margin-bottom: 10px;
            border-radius: 10px; cursor: pointer;
            transition: 0.2s;
        }
        .playlist-item:hover { background: rgba(255,255,255,0.1); }
        .playlist-item.active { background: rgba(29, 185, 84, 0.2); border: 1px solid var(--primary); }
        .playlist-item img {
            width: 45px; height: 45px; border-radius: 5px; margin-right: 15px;
        }
        .song-details p { font-size: 0.8rem; color: var(--text-dim); }

        /* Close Playlist Button */
        .close-playlist {
            position: absolute; top: 20px; right: 20px;
            background: none; border: none; color: #fff;
            font-size: 1.5rem; cursor: pointer; z-index: 30; display: none;
        }

        @media (max-width: 768px) {
            .player-container { width: 90%; height: auto; padding: 20px; }
            .playlist { width: 100%; right: -100%; }
            .close-playlist { display: block; }
        }
    </style>
</head>
<body>

    <!-- Background Image Layer -->
    <div class="bg-overlay" id="bg-overlay"></div>

    <!-- Close Playlist (Mobile) -->
    <button class="close-playlist" onclick="togglePlaylist()"><i class="fa fa-times"></i></button>

    <!-- Playlist Sidebar -->
    <div class="playlist" id="playlist">
        <div class="playlist-header">
            <h3>My Library</h3>
            <i class="fa fa-times" style="cursor:pointer; color:#fff;" onclick="togglePlaylist()"></i>
        </div>
        <div class="playlist-items" id="playlist-items">
            <!-- Populated by JS -->
        </div>
    </div>

    <!-- Main Player -->
    <div class="player-container">
        <div class="top-bar">
            <i class="fa fa-chevron-down"></i>
            <span>Now Playing</span>
            <i class="fa fa-bars" onclick="togglePlaylist()"></i>
        </div>

        <div class="img-box">
            <img src="" alt="cover" id="cover">
        </div>

        <!-- Visualizer Bars -->
        <div class="visualizer paused-anim" id="visualizer">
            <div class="bar"></div><div class="bar"></div><div class="bar"></div>
            <div class="bar"></div><div class="bar"></div><div class="bar"></div>
            <div class="bar"></div><div class="bar"></div><div class="bar"></div>
            <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        </div>

        <div class="song-info">
            <div class="text">
                <div class="name" id="name">Loading...</div>
                <div class="artist" id="artist">Artist Name</div>
            </div>
            <div class="like-btn" id="like-btn" onclick="toggleLike()">
                <i class="fa-regular fa-heart"></i>
            </div>
        </div>

        <div class="progress-area" id="progress-area">
            <div class="progress-bar" id="progress-bar"></div>
            <audio id="main-audio"></audio>
        </div>
        
        <div class="timer">
            <span id="current-time">0:00</span>
            <span id="max-duration">0:00</span>
        </div>

        <div class="controls">
            <button class="btn" id="repeat-btn" title="Repeat"><i class="fa fa-repeat"></i></button>
            <button class="btn" id="prev-btn" title="Previous"><i class="fa fa-backward-step"></i></button>
            <button class="btn play-btn" id="play-pause"><i class="fa fa-play"></i></button>
            <button class="btn" id="next-btn" title="Next"><i class="fa fa-forward-step"></i></button>
            <button class="btn" id="shuffle-btn" title="Shuffle"><i class="fa fa-shuffle"></i></button>
        </div>

        <div class="volume-container">
            <i class="fa fa-volume-low" style="color:var(--text-dim)"></i>
            <input type="range" min="0" max="100" value="70" id="volume-slider">
            <i class="fa fa-volume-high" style="color:var(--text-dim)"></i>
        </div>
    </div>

    <script>
        // --- DATA ---
        const musicList = [
            {
                name: "Cyberpunk City",
                artist: "Synthwave Boy",
                img: "https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=80",
                src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"
            },
            {
                name: "Midnight Lo-Fi",
                artist: "Chill Beats",
                img: "https://images.unsplash.com/photo-1514320291840-2e0a9bf2a9ae?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=80",
                src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"
            },
            {
                name: "Neon Dreams",
                artist: "Future Bass",
                img: "https://images.unsplash.com/photo-1493225255756-d9584f8606e9?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=80",
                src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3"
            },
            {
                name: "Deep Focus",
                artist: "Ambient Flow",
                img: "https://images.unsplash.com/photo-1508700115892-45ecd05ae2ad?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=80",
                src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3"
            }
        ];

        // --- DOM ELEMENTS ---
        const container = document.querySelector(".player-container");
        const cover = document.getElementById("cover");
        const name = document.getElementById("name");
        const artist = document.getElementById("artist");
        const mainAudio = document.getElementById("main-audio");
        const playPauseBtn = document.getElementById("play-pause");
        const prevBtn = document.getElementById("prev-btn");
        const nextBtn = document.getElementById("next-btn");
        const progressArea = document.getElementById("progress-area");
        const progressBar = document.getElementById("progress-bar");
        const bgOverlay = document.getElementById("bg-overlay");
        const visualizer = document.getElementById("visualizer");
        const playlist = document.getElementById("playlist");
        const playlistItems = document.getElementById("playlist-items");
        const likeBtn = document.getElementById("like-btn");

        let musicIndex = 0;
        let isPlaying = false;

        // --- INIT ---
        window.addEventListener("load", () => {
            loadMusic(musicIndex);
            renderPlaylist();
        });

        // --- FUNCTIONS ---
        function loadMusic(index) {
            name.innerText = musicList[index].name;
            artist.innerText = musicList[index].artist;
            cover.src = musicList[index].img;
            mainAudio.src = musicList[index].src;
            
            // Set Dynamic Background
            bgOverlay.style.backgroundImage = `url('${musicList[index].img}')`;
            
            // Reset Like button state
            likeBtn.innerHTML = '<i class="fa-regular fa-heart"></i>';
            likeBtn.querySelector('i').classList.remove('active');

            updatePlaylistActive(index);
        }

        function playMusic() {
            container.classList.add("paused");
            visualizer.classList.remove("paused-anim");
            playPauseBtn.innerHTML = '<i class="fa fa-pause"></i>';
            mainAudio.play();
            isPlaying = true;
        }

        function pauseMusic() {
            container.classList.remove("paused");
            visualizer.classList.add("paused-anim");
            playPauseBtn.innerHTML = '<i class="fa fa-play"></i>';
            mainAudio.pause();
            isPlaying = false;
        }

        function prevMusic() {
            musicIndex--;
            if(musicIndex < 0) musicIndex = musicList.length - 1;
            loadMusic(musicIndex);
            if(isPlaying) playMusic();
        }

        function nextMusic() {
            musicIndex++;
            if(musicIndex > musicList.length - 1) musicIndex = 0;
            loadMusic(musicIndex);
            if(isPlaying) playMusic();
        }

        // --- PLAYLIST LOGIC ---
        function renderPlaylist() {
            playlistItems.innerHTML = "";
            musicList.forEach((song, index) => {
                let li = `
                    <div class="playlist-item ${index === musicIndex ? 'active' : ''}" onclick="clicked(${index})">
                        <img src="${song.img}" alt="">
                        <div class="song-details">
                            <h4 style="color:#fff; font-size:0.9rem;">${song.name}</h4>
                            <p>${song.artist}</p>
                        </div>
                    </div>
                `;
                playlistItems.innerHTML += li;
            });
        }

        function clicked(index) {
            musicIndex = index;
            loadMusic(musicIndex);
            playMusic();
        }

        function updatePlaylistActive(index) {
            const allItems = playlistItems.querySelectorAll(".playlist-item");
            allItems.forEach(item => item.classList.remove("active"));
            allItems[index].classList.add("active");
        }

        function togglePlaylist() {
            playlist.classList.toggle("open");
        }

        function toggleLike() {
            const icon = likeBtn.querySelector('i');
            if(icon.classList.contains('fa-regular')) {
                icon.classList.remove('fa-regular');
                icon.classList.add('fa-solid', 'active');
            } else {
                icon.classList.remove('fa-solid', 'active');
                icon.classList.add('fa-regular');
            }
        }

        // --- EVENTS ---
        playPauseBtn.addEventListener("click", () => {
            isPlaying ? pauseMusic() : playMusic();
        });
        prevBtn.addEventListener("click", prevMusic);
        nextBtn.addEventListener("click", nextMusic);

        // Progress Update
        mainAudio.addEventListener("timeupdate", (e) => {
            const currentTime = e.target.currentTime;
            const duration = e.target.duration;
            if(!isNaN(duration)){
                let progressWidth = (currentTime / duration) * 100;
                progressBar.style.width = `${progressWidth}%`;
                
                // Update Time Text
                let curMin = Math.floor(currentTime / 60);
                let curSec = Math.floor(currentTime % 60);
                if(curSec < 10) curSec = `0${curSec}`;
                document.getElementById("current-time").innerText = `${curMin}:${curSec}`;
                
                let totMin = Math.floor(duration / 60);
                let totSec = Math.floor(duration % 60);
                if(totSec < 10) totSec = `0${totSec}`;
                document.getElementById("max-duration").innerText = `${totMin}:${totSec}`;
            }
        });

        progressArea.addEventListener("click", (e) => {
            let progressWidth = progressArea.clientWidth;
            let clickedOffsetX = e.offsetX;
            mainAudio.currentTime = (clickedOffsetX / progressWidth) * mainAudio.duration;
            playMusic();
        });

        mainAudio.addEventListener("ended", nextMusic);

        // Volume
        document.getElementById("volume-slider").addEventListener("input", (e) => {
            mainAudio.volume = e.target.value / 100;
        });

    </script>
</body>
</html>
